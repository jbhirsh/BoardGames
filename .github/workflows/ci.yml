name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint (includes jsx-a11y static a11y checks)
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Accessibility tests (axe-core on rendered components)
        run: npx vitest run src/__tests__/a11y.test.tsx

      - name: Unit tests with coverage
        run: npx vitest run --coverage

      - name: Build
        run: npm run build
