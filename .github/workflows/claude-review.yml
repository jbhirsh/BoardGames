name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO_DIR: ${{ github.workspace }}
            PR: ${{ github.event.pull_request.number }}

            Review this pull request for correctness, bugs, and adherence to the
            project conventions in CLAUDE.md. This is a React 19 + TypeScript
            SPA (Vite, Vitest, React Router) for browsing a personal board game
            collection. Focus on:
              - Logic errors and edge cases in filtering/sorting
              - Type safety and null/undefined handling
              - React pitfalls (stale closures, effect deps, unnecessary
                re-renders, missing keys)
              - Violations of the project's architecture (FilterContext reducer
                pattern, pure filtering utilities, static data layer)
              - Missing tests for new reducer actions, filter logic, or utility
                functions (Vitest + React Testing Library)
              - Accessibility regressions in new UI

            For every issue you find on a specific line, call the
            `mcp__github_inline_comment__create_inline_comment` tool to leave
            an inline comment anchored to that line. Do not summarize findings
            in a single top-level comment — use inline comments so each issue
            is anchored to the relevant code. Only use a top-level summary for
            overall impressions. Skip style nits already enforced by
            ESLint/Prettier. Be concise.
          classify_inline_comments: "true"
          claude_args: |
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
