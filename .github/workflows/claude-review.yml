name: Claude Code Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: claude-review-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    name: Claude Review
    if: >-
      github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Resolve PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" --jq '.[0]')
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "No PR associated with $SHA — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          BRANCH=$(echo "$PR_JSON" | jq -r '.head.ref')
          echo "PR #$NUMBER on branch $BRANCH"
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        if: steps.pr.outputs.skip == 'false'
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: steps.pr.outputs.skip == 'false'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO_DIR: ${{ github.workspace }}
            PR: ${{ steps.pr.outputs.number }}

            Review this pull request for correctness, bugs, and adherence to
            the project's engineering conventions. This is a React 19 +
            TypeScript SPA (Vite, Vitest, React Router) for browsing a personal
            board game collection.

            ## Code review focus

            Flag issues in these areas:
              - Logic errors and edge cases in filtering/sorting
              - Type safety and null/undefined handling (strict TypeScript)
              - React pitfalls (stale closures, effect deps, unnecessary
                re-renders, missing keys)
              - Violations of the project's architecture (FilterContext reducer
                pattern, pure filtering utilities, static data layer in
                `src/data/`, components in `src/components/`)
              - Accessibility regressions in new UI

            ## Engineering conventions to enforce

            Treat violations of these as review issues and flag them inline:

            **Testing:**
              - Every new reducer action, filter utility, or service function
                must have a unit test in `src/__tests__/` (Vitest + React
                Testing Library). Flag any new reducer action / filter logic /
                utility without a corresponding test.
              - Tests must be pure logic or RTL — no real browser, no real
                network.
              - NEVER modify tests to make them pass — the fix belongs in the
                implementation. If a PR changes a test assertion to match new
                (possibly-wrong) behavior instead of fixing the code, flag it.

            **TypeScript / ESLint:**
              - All new code must be typed (strict mode).
              - NEVER use inline `// eslint-disable-next-line` or
                `/* eslint-disable */` comments. If a rule needs to be relaxed,
                it must be a file-scoped override in `eslint.config.js`. Flag
                any inline disable as a blocking issue.

            **Commit hygiene (inspect `git log` on the PR branch):**
              - Each commit subject should be imperative and ≤72 chars, with a
                blank line and a body explaining *why* (not *what*).
              - Commits should end with a `Co-Authored-By:` trailer when
                authored with Claude.
              - "Fix X" / "oops" / "typo" commits should be squashed into the
                feature commit they patch before the PR is opened or updated.
                CI/infra/workflow fixes are exempt. If you see a debugging
                trail in the history, flag it.
              - No merge commits on the branch — history should be linear
                (rebase, not merge). Flag any merge commits.

            **Scope:**
              - The PR should do one thing. Flag unrelated refactors, drive-by
                formatting changes, or new abstractions that aren't required
                by the task.
              - Don't add error handling or fallbacks for scenarios that
                can't happen. Only validate at system boundaries.

            **Security / safety:**
              - Flag any committed secrets, API keys, or `.env` files.
              - Flag use of `git add -A` or `--no-verify` patterns if visible
                in commit messages or scripts.
              - DO NOT flag floating GitHub Action version tags
                (e.g. `@v5`, `@v1`) as a supply-chain risk or suggest pinning
                to commit SHAs. The maintainer has accepted this trade-off
                and prefers automatic patch/minor updates.

            ## Output format

            For every issue you find on a specific line, call the
            `mcp__github_inline_comment__create_inline_comment` tool to leave
            an inline comment anchored to that line. Do not summarize findings
            in a single top-level comment — use inline comments so each issue
            is anchored to the relevant code. Only use a top-level summary for
            overall impressions. Skip style nits already enforced by
            ESLint/Prettier. Be concise.
          classify_inline_comments: "true"
          claude_args: |
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
